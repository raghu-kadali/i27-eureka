apiVersion: apps/v1
kind: Deployment
metadata:
  name: i27-eureka-app
  labels:  
    app: i27-eureka-app   
spec:
  replicas: 1
  selector:
    matchLabels:
      app: i27-eureka-app
  template:
    metadata:
      labels:
        app: i27-eureka-app
    spec:
      containers:
      - name: i27-eureka-app
        image: DIT # this will be replaced by shared library
        ports:
        - containerPort: 8761
---
# Service 
apiVersion: v1
kind: Service           
metadata:
  name: i27-eureka-service
spec: 
  selector:
    app: i27-eureka-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8761
  type: NodePort